services:
  webapi:
    build:
      context: .
      dockerfile: src/WebAPI/Dockerfile
    container_name: imssb-bc-webapi
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PORT: 8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=imssb-bc;Username=postgres;Password=postgres;Include Error Detail=true
      JwtSettings__SecretKey: dev-compose-secret-change-before-production-32chars
      JwtSettings__Issuer: imssb-bc-net-backend-dev
      JwtSettings__Audience: imssb-bc-net-frontend-dev
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost:3000,http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: imssb-auth-postgres
    environment:
      POSTGRES_DB: imssb-bc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres17_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d imssb-bc"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres17_data:
