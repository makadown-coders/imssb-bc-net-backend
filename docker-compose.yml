services:
  postgres:
    image: postgres:17-alpine
    container_name: imssb-auth-postgres
    environment:
      POSTGRES_DB: imssb-bc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres17_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d imssb-bc"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres17_data:
